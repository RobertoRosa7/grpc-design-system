spring:
  application:
    name: document-pdf-grpc
  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://localhost:27017/orderflow}
      auto-index-creation: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
    prometheus:
      enabled: true
  metrics:
    tags:
      service: document-pdf-grpc

minio:
  endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
  access-key: ${MINIO_ACCESS_KEY:minioadmin}
  secret-key: ${MINIO_SECRET_KEY:minioadmin}
  bucket: ${MINIO_BUCKET:documents}

grpc:
  server:
    port: ${GRPC_PORT:9090}
    # Habilita reflexão do serviço — útil para grpcurl e testes manuais
    reflection:
      enabled: true
  client:
    document-service:
      address: static://localhost:${GRPC_PORT:9090}
      negotiation-type: plaintext

logging:
  level:
    br.com.orderflow: DEBUG
    net.devh.boot.grpc: INFO

app:
  security:
    jwt:
      enabled: ${APP_SECURITY_JWT_ENABLED:true}
      certificate-path: ${APP_SECURITY_JWT_CERTIFICATE_PATH:classpath:certs/jwt-public.pem}
      issuer: ${APP_SECURITY_JWT_ISSUER:}
      audience: ${APP_SECURITY_JWT_AUDIENCE:}
      clock-skew-seconds: ${APP_SECURITY_JWT_CLOCK_SKEW_SECONDS:60}
      unsecured-methods:
        - grpc.reflection.v1alpha.ServerReflection/ServerReflectionInfo
        - grpc.reflection.v1.ServerReflection/ServerReflectionInfo
        - grpc.health.v1.Health/Check
        - grpc.health.v1.Health/Watch

resilience4j:
  circuitbreaker:
    instances:
      minio:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 3
        slow-call-duration-threshold: 5s
        slow-call-rate-threshold: 100
      mongodb:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 15s
        permitted-number-of-calls-in-half-open-state: 3
  retry:
    instances:
      minio:
        max-attempts: 3
        wait-duration: 200ms
        exponential-backoff-multiplier: 2
        retry-exceptions:
          - br.com.orderflow.document.infra.adapter.minio.exception.MinioStorageException
      mongodb:
        max-attempts: 3
        wait-duration: 100ms
        exponential-backoff-multiplier: 2
        retry-exceptions:
          - br.com.orderflow.document.infra.adapter.mongodb.exception.MongoPersistenceException
